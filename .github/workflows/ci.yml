name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Fast plain-Go checks: formatting, vet, tidiness, and that the plugin
  # compiles against the released vinculum module.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Check go.mod/go.sum are tidy
        run: go mod tidy -diff

      - name: Build plugin (.so)
        run: go build -buildmode=plugin -o example.so .

  # End-to-end smoke test. Go plugins require cgo (-buildmode=plugin needs
  # external linking) and the .so must match the host binary's toolchain
  # and cgo/build state exactly, so we build BOTH the host binary and the
  # plugin here on the runner with the default cgo-enabled settings.
  #
  # GOTOOLCHAIN=local pins both builds to the toolchain set up below (from
  # go.mod) and prevents `go install` from silently upgrading to a newer
  # patch release for the host only, which would produce an ABI mismatch
  # (e.g. "plugin was built with a different version of package
  # internal/godebugs"). The host is installed from the same released
  # vinculum version the plugin compiles against.
  smoke:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Determine vinculum version
        id: ver
        run: |
          version=$(go list -m -f '{{.Version}}' github.com/tsarna/vinculum)
          echo "Using vinculum $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install matching vinculum host binary
        run: go install github.com/tsarna/vinculum@${{ steps.ver.outputs.version }}

      - name: Build plugin (.so)
        run: |
          mkdir -p plugins
          go build -buildmode=plugin -o plugins/example.so .

      - name: Smoke test (host loads plugin + validates config)
        run: |
          "$(go env GOPATH)/bin/vinculum" check --plugin-path plugins examples/
